site_name: CCAF 101
site_description: Claude Certified Architect - Foundations study notes
site_url: https://bitboom.github.io/ccaf101/
repo_url: https://github.com/bitboom/ccaf101
repo_name: GitHub
docs_dir: docs

theme:
  name: readthedocs
  custom_dir: overrides

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 홈: index.md
  - 시험 개요: exam-overview.md
  - 개념:
      - Agent Loop: concepts/agent-loop.md
      - Coordinator / Subagent: concepts/coordinator-subagent.md
      - Hooks & Enforcement: concepts/hooks-and-enforcement.md
      - Task Decomposition: concepts/task-decomposition.md
      - Session Management: concepts/session-management.md
      - Tool Interface Design: concepts/tool-interface-design.md
      - Tool Selection & Disambiguation: concepts/tool-selection-and-disambiguation.md
      - Structured Outputs & Error Design: concepts/structured-outputs-and-error-design.md
      - MCP Integration: concepts/mcp-integration.md
      - Tool Safety Boundaries: concepts/tool-safety-boundaries.md
      - CLAUDE.md & Instruction Hierarchy: concepts/claude-md-and-instruction-hierarchy.md
      - Rules as Operational Memory: concepts/rules-as-operational-memory.md
      - Plan Mode & Execution Control: concepts/plan-mode-and-execution-control.md
      - Coding Workflow Design: concepts/coding-workflow-design.md
      - Team Conventions & Reproducibility: concepts/team-conventions-and-reproducibility.md
      - CI, Guardrails & Review Boundaries: concepts/ci-guardrails-and-review-boundaries.md
      - Structured Output as Contract: concepts/structured-output-as-contract.md
      - Schema Design for Reliability: concepts/schema-design-for-reliability.md
      - Few-shot Patterns for Output Consistency: concepts/few-shot-patterns-for-output-consistency.md
      - Validation, Repair & Retry Loops: concepts/validation-repair-and-retry-loops.md
      - Batch Generation Strategy: concepts/batch-generation-strategy.md
      - Human-readable vs Machine-usable Outputs: concepts/human-readable-vs-machine-usable-outputs.md
  - 도메인:
      - D1. 에이전트 아키텍처: domains/01-agent-architecture-and-orchestration.md
      - D2. 도구 설계와 MCP: domains/02-tool-design-and-mcp-integration.md
      - D3. Claude Code 워크플로: domains/03-claude-code-configuration-and-workflows.md
      - D4. 구조화된 출력: domains/04-prompt-engineering-and-structured-output.md
