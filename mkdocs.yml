site_name: CCAF 101
site_description: Claude Certified Architect - Foundations study notes
site_url: https://bitboom.github.io/ccaf101/
repo_url: https://github.com/bitboom/ccaf101
repo_name: GitHub
docs_dir: docs

theme:
  name: readthedocs
  custom_dir: overrides

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - 홈: index.md
  - 시험 개요: exam-overview.md
  - 개념:
      - Agent Loop: concepts/agent-loop.md
      - Coordinator / Subagent: concepts/coordinator-subagent.md
      - Hooks & Enforcement: concepts/hooks-and-enforcement.md
      - Task Decomposition: concepts/task-decomposition.md
      - Session Management: concepts/session-management.md
      - Tool Interface Design: concepts/tool-interface-design.md
      - Tool Selection & Disambiguation: concepts/tool-selection-and-disambiguation.md
      - Structured Outputs & Error Design: concepts/structured-outputs-and-error-design.md
      - MCP Integration: concepts/mcp-integration.md
      - Tool Safety Boundaries: concepts/tool-safety-boundaries.md
  - 도메인:
      - D1. 에이전트 아키텍처: domains/01-agent-architecture-and-orchestration.md
      - D2. 도구 설계와 MCP: domains/02-tool-design-and-mcp-integration.md
      - D3. Claude Code 워크플로: domains/03-claude-code-configuration-and-workflows.md
      - D4. 구조화된 출력: domains/04-prompt-engineering-and-structured-output.md
      - D5. 문맥 관리와 신뢰성: domains/05-context-management-and-reliability.md
